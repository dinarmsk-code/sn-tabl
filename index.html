<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XLSX → Firebase Firestore → XLSX</title>
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <!-- SheetJS (XLSX) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .drop-zone {
            border: 2px dashed #1976d2;
            border-radius: 16px;
            padding: 40px 20px;
            background: #f8faff;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }
        .drop-zone.dragover {
            background: #e3f2fd;
            border-color: #0d47a1;
            transform: scale(1.02);
        }
        .drop-zone p {
            margin: 0;
            font-weight: 500;
            color: #333;
        }
        .drop-zone .file-name {
            color: #1976d2;
            font-weight: 600;
            margin-top: 8px;
            word-break: break-all;
        }
        .btn {
            background: #1976d2;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn:disabled {
            background: #90caf9;
            cursor: not-allowed;
            transform: none;
        }
        .btn:not(:disabled):hover {
            background: #1565c0;
        }
        .btn:not(:disabled):active {
            transform: scale(0.98);
        }
        .download-btn {
            background: #2e7d32;
        }
        .download-btn:hover {
            background: #1b5e20;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
        }
        .status.info {
            background: #e3f2fd;
            color: #0d47a1;
        }
        .status.success {
            background: #e8f5e9;
            color: #1b5e20;
        }
        .status.error {
            background: #ffebee;
            color: #b71c1c;
        }
        .progress {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 16px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #1976d2;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 XLSX ↔ Firestore</h1>
    <p class="subtitle">Загрузите Excel-файл, данные сохранятся в Firestore, и вы получите обновлённый XLSX</p>

    <div class="drop-zone" id="dropZone">
        <p>📂 Перетащите XLSX‑файл сюда</p>
        <p>или кликните, чтобы выбрать</p>
        <p class="file-name" id="fileName"></p>
        <input type="file" id="fileInput" accept=".xlsx, .xls" hidden>
    </div>

    <button class="btn" id="uploadBtn" disabled>🚀 Загрузить и обновить базу</button>
    <button class="btn download-btn" id="downloadBtn" style="display: none;">⬇️ Скачать полный XLSX из Firestore</button>

    <div class="progress" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status info" id="status">Ожидание файла...</div>
</div>

<script>
    // ======================== КОНФИГУРАЦИЯ FIREBASE ========================
    // ВСТАВЬТЕ СЮДА ВАШИ ДАННЫЕ ИЗ КОНСОЛИ FIREBASE
    const firebaseConfig = {
        apiKey: "ВАШ_API_KEY",
        authDomain: "https://sn-tabl-default-rtdb.firebaseio.com",
        projectId: "sn-tabl",
        storageBucket: "ВАШ_PROJECT.appspot.com",
        messagingSenderId: "295977923639",
        appId: "ВАШ_APP_ID"
    };

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    // Коллекция, в которой будем хранить все строки
    const COLLECTION_NAME = "excel_rows";

    // ======================== ИНТЕРФЕЙС ========================
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileNameDisplay = document.getElementById('fileName');
    const statusDiv = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');

    let selectedFile = null;

    // Обработчики drag-and-drop
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            updateFileSelection(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) {
            updateFileSelection(fileInput.files[0]);
        }
    });

    function updateFileSelection(file) {
        selectedFile = file;
        fileNameDisplay.textContent = `Выбран: ${file.name}`;
        uploadBtn.disabled = false;
        setStatus(`Готов к загрузке (${(file.size / 1024).toFixed(1)} КБ)`, 'info');
    }

    // Кнопка загрузки и вставки в Firestore
    uploadBtn.addEventListener('click', async () => {
        if (!selectedFile) return;
        uploadBtn.disabled = true;
        downloadBtn.style.display = 'none';
        progressContainer.style.display = 'block';
        setProgress(0);
        setStatus('Чтение XLSX...', 'info');

        try {
            // 1. Читаем XLSX в массив объектов
            const data = await readXlsxFile(selectedFile);
            if (!data || data.length === 0) {
                throw new Error('Файл пуст или не содержит строк данных.');
            }
            setStatus(`Файл прочитан: ${data.length} строк. Загрузка в Firestore...`, 'info');
            setProgress(10);

            // 2. Добавляем строки в Firestore (пакетами по 500)
            await addRowsToFirestore(data, (progress) => {
                const pct = 10 + Math.floor(progress * 80); // 10-90%
                setProgress(pct);
                setStatus(`Добавлено ${progress * data.length | 0} из ${data.length} строк...`, 'info');
            });

            setStatus(`✅ Успешно добавлено ${data.length} строк в коллекцию "${COLLECTION_NAME}"`, 'success');
            setProgress(100);

            // 3. Готовим кнопку для скачивания полной выгрузки
            downloadBtn.style.display = 'inline-block';
        } catch (err) {
            console.error(err);
            setStatus(`❌ Ошибка: ${err.message}`, 'error');
            setProgress(0);
        } finally {
            uploadBtn.disabled = false;
            // Не скрываем прогресс сразу, чтобы была видна полоса
            setTimeout(() => {
                progressContainer.style.display = 'none';
            }, 2000);
        }
    });

    // Кнопка скачивания всех данных из Firestore
    downloadBtn.addEventListener('click', async () => {
        downloadBtn.disabled = true;
        setStatus('Загрузка всех данных из Firestore...', 'info');
        progressContainer.style.display = 'block';
        setProgress(0);
        try {
            const allRows = await fetchAllRows();
            if (allRows.length === 0) {
                throw new Error('База данных пуста.');
            }
            setProgress(80);
            const xlsxBlob = generateXlsxBlob(allRows);
            triggerDownload(xlsxBlob, 'firestore_export.xlsx');
            setProgress(100);
            setStatus(`✅ Готово! Скачан файл с ${allRows.length} строками.`, 'success');
        } catch (err) {
            console.error(err);
            setStatus(`❌ Ошибка: ${err.message}`, 'error');
        } finally {
            downloadBtn.disabled = false;
            setTimeout(() => {
                progressContainer.style.display = 'none';
            }, 2000);
        }
    });

    // ======================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ========================
    function setStatus(text, type) {
        statusDiv.textContent = text;
        statusDiv.className = `status ${type}`;
    }

    function setProgress(percent) {
        progressBar.style.width = `${Math.min(100, Math.max(0, percent))}%`;
    }

    // Чтение XLSX-файла → массив объектов
    function readXlsxFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheet];
                    const json = XLSX.utils.sheet_to_json(worksheet, { defval: '' });
                    resolve(json);
                } catch (err) {
                    reject(new Error('Не удалось прочитать XLSX. Убедитесь, что формат корректен.'));
                }
            };
            reader.onerror = () => reject(new Error('Ошибка чтения файла.'));
            reader.readAsArrayBuffer(file);
        });
    }

    // Добавление строк в Firestore пакетами (batch write)
    async function addRowsToFirestore(rows, progressCallback) {
        const BATCH_SIZE = 500; // Максимум для Firestore batch
        const totalBatches = Math.ceil(rows.length / BATCH_SIZE);

        for (let i = 0; i < totalBatches; i++) {
            const batch = db.batch();
            const start = i * BATCH_SIZE;
            const end = Math.min(start + BATCH_SIZE, rows.length);
            const chunk = rows.slice(start, end);

            chunk.forEach(row => {
                // Каждая строка становится отдельным документом с авто-ID
                const docRef = db.collection(COLLECTION_NAME).doc();
                batch.set(docRef, row);
            });

            await batch.commit();
            // Обновляем прогресс
            if (progressCallback) {
                progressCallback((i + 1) / totalBatches);
            }
        }
    }

    // Получение всех документов из коллекции
    async function fetchAllRows() {
        const snapshot = await db.collection(COLLECTION_NAME).get();
        return snapshot.docs.map(doc => doc.data());
    }

    // Генерация XLSX-файла из массива объектов
    function generateXlsxBlob(data) {
        const worksheet = XLSX.utils.json_to_sheet(data);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, 'Data');
        const xlsxBuffer = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
        return new Blob([xlsxBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    }

    // Скачивание Blob как файла
    function triggerDownload(blob, filename) {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
