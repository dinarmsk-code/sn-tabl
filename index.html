<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XLSX → Firebase Firestore → XLSX</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="xlsx.full.min.js"></script>
    <style>
        /* ===== Neumorphism (Soft UI) Styles ===== */
        :root {
            --bg: #e8ecf1;
            --surface: #e8ecf1;
            --primary: #6c7b95;
            --primary-dark: #4a5568;
            --primary-light: #8e9baf;
            --success: #7d9b7e;
            --success-dark: #5c7a5d;
            --danger: #c2887d;
            --danger-dark: #a0655c;
            --text: #4a5568;
            --text-secondary: #7b8799;
            --text-light: #9aa5b4;
            --shadow-light: #ffffff;
            --shadow-dark: #c8cfd8;
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 24px;
            --radius-xl: 28px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        /* Фоновые декоративные элементы */
        body::before {
            content: '';
            position: fixed;
            top: -180px;
            right: -180px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: var(--bg);
            box-shadow: 40px 40px 80px var(--shadow-dark),
                -40px -40px 80px var(--shadow-light);
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -150px;
            left: -150px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--bg);
            box-shadow: 35px 35px 70px var(--shadow-dark),
                -35px -35px 70px var(--shadow-light);
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow:
                18px 18px 36px var(--shadow-dark),
                -18px -18px 36px var(--shadow-light);
            padding: 44px 36px 36px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            transition: box-shadow var(--transition);
        }

        .container:hover {
            box-shadow:
                20px 20px 40px var(--shadow-dark),
                -20px -20px 40px var(--shadow-light);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .icon-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--surface);
            box-shadow: 6px 6px 14px var(--shadow-dark),
                -6px -6px 14px var(--shadow-light);
            font-size: 22px;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.6;
        }

        /* Зона Drag-and-Drop – вдавленная */
        .drop-zone {
            border: none;
            border-radius: var(--radius-lg);
            padding: 40px 20px;
            background: var(--surface);
            box-shadow:
                inset 6px 6px 14px var(--shadow-dark),
                inset -6px -6px 14px var(--shadow-light);
            cursor: pointer;
            transition: all var(--transition);
            margin-bottom: 24px;
            position: relative;
        }

        .drop-zone.dragover {
            box-shadow:
                inset 8px 8px 18px var(--shadow-dark),
                inset -8px -8px 18px var(--shadow-light);
            transform: scale(1.02);
            border: 2px dashed var(--primary);
        }

        .drop-zone p {
            margin: 0;
            font-weight: 500;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .drop-zone .file-name {
            color: var(--primary);
            font-weight: 600;
            margin-top: 8px;
            word-break: break-all;
            pointer-events: none;
        }

        /* Кнопки – выпуклые */
        .btn {
            background: var(--surface);
            color: var(--text);
            border: none;
            padding: 14px 32px;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            width: 100%;
            margin-bottom: 12px;
            box-shadow:
                7px 7px 16px var(--shadow-dark),
                -7px -7px 16px var(--shadow-light);
        }

        .btn:disabled {
            color: var(--text-light);
            cursor: not-allowed;
            box-shadow:
                3px 3px 8px var(--shadow-dark),
                -3px -3px 8px var(--shadow-light);
            transform: none;
        }

        .btn:not(:disabled):hover {
            box-shadow:
                10px 10px 22px var(--shadow-dark),
                -10px -10px 22px var(--shadow-light);
            color: var(--primary-dark);
        }

        .btn:not(:disabled):active {
            box-shadow:
                inset 5px 5px 12px var(--shadow-dark),
                inset -5px -5px 12px var(--shadow-light);
            transform: scale(0.97);
        }

        .download-btn {
            color: var(--success-dark);
        }

        .download-btn:not(:disabled):hover {
            color: var(--success-dark);
        }

        .download-btn:not(:disabled):active {
            color: var(--success);
        }

        /* Статус – вдавленный */
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 14px;
            box-shadow:
                inset 4px 4px 10px var(--shadow-dark),
                inset -4px -4px 10px var(--shadow-light);
            transition: all var(--transition);
        }

        .status.info {
            background: var(--surface);
            color: var(--text);
        }

        .status.success {
            background: #e8f0e9;
            color: #3d5a3f;
            box-shadow:
                inset 4px 4px 10px #c8d6c9,
                inset -4px -4px 10px #ffffff;
        }

        .status.error {
            background: #f3e8e7;
            color: #7a3f3a;
            box-shadow:
                inset 4px 4px 10px #dccac8,
                inset -4px -4px 10px #ffffff;
        }

        /* Прогресс-бар */
        .progress {
            width: 100%;
            height: 10px;
            background: var(--surface);
            border-radius: 20px;
            margin-top: 16px;
            overflow: hidden;
            display: none;
            box-shadow:
                inset 3px 3px 7px var(--shadow-dark),
                inset -3px -3px 7px var(--shadow-light);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 20px;
            transition: width 0.4s ease;
            box-shadow: 0 0 12px rgba(108, 123, 149, 0.35);
        }

        .warning-text {
            color: var(--danger);
            font-size: 12px;
            margin-top: 8px;
            display: none;
            font-weight: 500;
            background: var(--surface);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            box-shadow:
                inset 3px 3px 7px var(--shadow-dark),
                inset -3px -3px 7px var(--shadow-light);
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 18px 24px;
            }
            h1 {
                font-size: 22px;
            }
            .drop-zone {
                padding: 30px 16px;
            }
            .btn {
                padding: 13px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <span class="icon-circle"></span>
        XLSX ↔ Firestore
    </h1>
    <p class="subtitle">Загрузите Excel-файл, и данные сохранятся в Firestore. Затем можно выгрузить всё обратно в XLSX.</p>

    <div class="drop-zone" id="dropZone">
        <p> Перетащите XLSX‑файл сюда</p>
        <p>или кликните, чтобы выбрать</p>
        <p class="file-name" id="fileName"></p>
        <input type="file" id="fileInput" accept=".xlsx" hidden>
    </div>

    <button class="btn" id="uploadBtn" disabled> Загрузить и обновить базу</button>
    <button class="btn download-btn" id="downloadBtn"> Скачать все данные из Firestore</button>

    <div class="progress" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status info" id="status">Инициализация...</div>
    <div class="warning-text" id="authWarning" style="display:none;">⚠️ Аутентификация не удалась. Проверьте настройки Firebase.</div>
</div>

<script>
    // Проверка библиотеки XLSX
    if (typeof XLSX === 'undefined') {
        document.getElementById('status').textContent = '❌ Библиотека XLSX не загружена. Скачайте xlsx.full.min.js и положите в папку с HTML.';
        document.getElementById('status').className = 'status error';
        throw new Error('XLSX не загружена');
    }

    // ======================== КОНФИГУРАЦИЯ FIREBASE ========================
    const firebaseConfig = {
        apiKey: "AIzaSyD5QdTrZShpcSKN7qk1M6CP_fLb0wpCDJI",
        authDomain: "sn-tabl.firebaseapp.com",
        projectId: "sn-tabl",
        storageBucket: "sn-tabl.firebasestorage.app",
        messagingSenderId: "295977923639",
        appId: "1:295977923639:web:cd1891b1f119c9c8423bb2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const COLLECTION_NAME = "excel_rows";
    const BATCH_SIZE = 500;
    const FETCH_LIMIT = 500;
    const MAX_RETRIES = 3;

    // ---------------------- UI элементы ----------------------
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileNameDisplay = document.getElementById('fileName');
    const statusDiv = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const authWarning = document.getElementById('authWarning');

    let selectedFile = null;
    let authReady = false;

    // ---------------------- Аутентификация ----------------------
    async function ensureAuthenticated() {
        if (auth.currentUser) return true;
        try {
            setStatus('Выполняется анонимный вход...', 'info');
            await auth.signInAnonymously();
            setStatus('Готов к работе.', 'info');
            authReady = true;
            uploadBtn.disabled = !selectedFile;
            authWarning.style.display = 'none';
            return true;
        } catch (err) {
            console.warn('Анонимный вход не удался:', err.message);
            authReady = false;
            setStatus('⚠️ Аутентификация отключена. Убедитесь, что правила Firestore разрешают открытый доступ.', 'info');
            authWarning.style.display = 'block';
            uploadBtn.disabled = true; // без аутентификации загрузка невозможна
            return false;
        }
    }

    (async () => {
        const ok = await ensureAuthenticated();
        // Если аутентификация не удалась, кнопка загрузки останется заблокированной
        if (ok) {
            console.log('Аутентификация выполнена');
        } else {
            console.log('Аутентификация не требуется?');
        }
    })();

    // ---------------------- Drag-and-drop ----------------------
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            updateFileSelection(e.dataTransfer.files[0]);
        }
    });
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) updateFileSelection(fileInput.files[0]);
    });

    function updateFileSelection(file) {
        selectedFile = file;
        fileNameDisplay.textContent = `Выбран: ${file.name}`;
        if (authReady) {
            uploadBtn.disabled = false;
        } else {
            setStatus('Дождитесь входа или настройте аутентификацию...', 'info');
            uploadBtn.disabled = true;
        }
        setStatus(`Готов к загрузке (${(file.size / 1024).toFixed(1)} КБ)`, 'info');
    }

    // ---------------------- Загрузка XLSX → Firestore ----------------------
    uploadBtn.addEventListener('click', async () => {
        if (!selectedFile || !authReady) return;
        uploadBtn.disabled = true;
        downloadBtn.disabled = true;
        progressContainer.style.display = 'block';
        setProgress(0);
        setStatus('Чтение XLSX...', 'info');

        try {
            // повторно убедимся, что аутентификация есть
            await ensureAuthenticated();
            if (!authReady) throw new Error('Аутентификация не выполнена.');
            const data = await readXlsxFile(selectedFile);
            if (!data || data.length === 0) throw new Error('Файл пуст или не содержит строк данных.');
            setStatus(`Файл прочитан: ${data.length} строк. Загрузка в Firestore...`, 'info');
            setProgress(10);
            await addRowsToFirestore(data, (progress) => {
                const pct = 10 + Math.floor(progress * 80);
                setProgress(pct);
                setStatus(`Обработано ${Math.round(progress * data.length)} из ${data.length} строк...`, 'info');
            });
            setStatus(`✅ Успешно добавлено ${data.length} строк в коллекцию "${COLLECTION_NAME}"`, 'success');
            setProgress(100);
        } catch (err) {
            console.error(err);
            setStatus(`❌ Ошибка: ${err.message}`, 'error');
            setProgress(0);
        } finally {
            uploadBtn.disabled = false;
            downloadBtn.disabled = false;
            // прогресс-бар не скрываем автоматически, оставляем пользователю видеть результат
            setTimeout(() => {
                if (progressBar.style.width === '100%') {
                    progressContainer.style.display = 'none';
                }
            }, 3000);
        }
    });

    // ---------------------- Выгрузка из Firestore → XLSX ----------------------
    downloadBtn.addEventListener('click', async () => {
        downloadBtn.disabled = true;
        uploadBtn.disabled = true;
        setStatus('Загрузка данных из Firestore...', 'info');
        progressContainer.style.display = 'block';
        setProgress(0);
        try {
            await ensureAuthenticated();
            const allRows = await fetchAllRowsPaginated((count) => {
                setStatus(`Получено ${count} документов...`, 'info');
                // прогресс-бар просто двигаем на 1% за каждые 50 документов, чисто для визуализации активности
                setProgress(Math.min(count / 50, 90));
            });
            if (allRows.length === 0) throw new Error('База данных пуста.');
            setProgress(90);
            const xlsxBlob = generateXlsxBlob(allRows);
            triggerDownload(xlsxBlob, 'firestore_export.xlsx');
            setProgress(100);
            setStatus(`✅ Готово! Скачан файл с ${allRows.length} строками.`, 'success');
        } catch (err) {
            console.error(err);
            setStatus(`❌ Ошибка: ${err.message}`, 'error');
        } finally {
            downloadBtn.disabled = false;
            uploadBtn.disabled = !selectedFile;
            setTimeout(() => {
                if (progressBar.style.width === '100%') {
                    progressContainer.style.display = 'none';
                }
            }, 3000);
        }
    });

    // ======================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ========================
    function setStatus(text, type) {
        statusDiv.textContent = text;
        statusDiv.className = `status ${type}`;
    }

    function setProgress(percent) {
        progressBar.style.width = `${Math.min(100, Math.max(0, percent))}%`;
    }

    function readXlsxFile(file) {
        return new Promise((resolve, reject) => {
            if (!file) return reject(new Error('Файл не выбран.'));
            if (!file.name.match(/\.xlsx$/i)) {
                return reject(new Error('Файл должен иметь расширение .xlsx. Получен: ' + file.name));
            }
            if (typeof XLSX === 'undefined') {
                return reject(new Error('Библиотека XLSX не загружена.'));
            }

            const reader = new FileReader();
            reader.onerror = () => reject(new Error('Ошибка чтения файла. Возможно, файл повреждён.'));
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    let workbook;
                    try {
                        workbook = XLSX.read(data, { type: 'array', cellDates: true });
                    } catch (readErr) {
                        return reject(new Error('Формат файла не поддерживается или файл повреждён. ' + readErr.message));
                    }
                    if (!workbook.SheetNames || workbook.SheetNames.length === 0) {
                        return reject(new Error('В книге не найдено ни одного листа.'));
                    }
                    const firstSheet = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheet];
                    if (!worksheet) {
                        return reject(new Error('Лист "' + firstSheet + '" пуст или повреждён.'));
                    }
                    let json;
                    try {
                        json = XLSX.utils.sheet_to_json(worksheet, { defval: '' });
                    } catch (sheetErr) {
                        return reject(new Error('Не удалось преобразовать лист в JSON. ' + sheetErr.message));
                    }
                    if (!Array.isArray(json)) return reject(new Error('Результат парсинга не является массивом.'));
                    resolve(json);
                } catch (err) {
                    reject(new Error('Внутренняя ошибка при обработке XLSX. ' + err.message));
                }
            };
            reader.readAsArrayBuffer(file);
        });
    }

    function generateDeterministicId(row) {
        const str = JSON.stringify(row);
        // Base64 от строки, заменяем недопустимые символы, обрезаем до максимально допустимой длины ID (1500 байт)
        let hash = btoa(unescape(encodeURIComponent(str))).replace(/[^a-zA-Z0-9_-]/g, '_');
        if (hash.length > 1500) {
            hash = hash.substring(0, 1500);
        }
        return hash;
    }

    async function commitChunkWithRetry(chunk, maxRetries = MAX_RETRIES) {
        for (let attempt = 1; attempt <= maxRetries; attempt++) {
            const batch = db.batch();
            chunk.forEach(row => {
                const docId = generateDeterministicId(row);
                batch.set(db.collection(COLLECTION_NAME).doc(docId), row);
            });
            try {
                await batch.commit();
                return;
            } catch (err) {
                if (attempt === maxRetries) throw err;
                const delay = Math.pow(2, attempt) * 500 + Math.random() * 500;
                await new Promise(resolve => setTimeout(resolve, delay));
            }
        }
    }

    async function addRowsToFirestore(rows, progressCallback) {
        const totalBatches = Math.ceil(rows.length / BATCH_SIZE);
        for (let i = 0; i < totalBatches; i++) {
            const start = i * BATCH_SIZE;
            const end = Math.min(start + BATCH_SIZE, rows.length);
            const chunk = rows.slice(start, end);
            await commitChunkWithRetry(chunk);
            if (progressCallback) progressCallback((i + 1) / totalBatches);
        }
    }

    async function fetchAllRowsPaginated(onProgress) {
        const result = [];
        let lastDoc = null;
        let hasMore = true;
        while (hasMore) {
            let query = db.collection(COLLECTION_NAME)
                .orderBy(firebase.firestore.FieldPath.documentId())
                .limit(FETCH_LIMIT);
            if (lastDoc) query = query.startAfter(lastDoc);
            const snapshot = await query.get();
            if (snapshot.empty) {
                hasMore = false;
                break;
            }
            snapshot.forEach(doc => result.push(doc.data()));
            lastDoc = snapshot.docs[snapshot.docs.length - 1];
            if (onProgress) onProgress(result.length);
            if (snapshot.size < FETCH_LIMIT) hasMore = false;
        }
        return result;
    }

    function generateXlsxBlob(data) {
        const worksheet = XLSX.utils.json_to_sheet(data);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, 'Data');
        const xlsxBuffer = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
        return new Blob([xlsxBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    }

    function triggerDownload(blob, filename) {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
